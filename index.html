<!DOCTYPE html>
<html>
<head>
    <title>Incremental Alchemy</title>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
<header>
    <h2 style="text-align: center">The Great Work</h2>
    <h2 style="text-align: center" id="game-subtitle">
        <span style="color: blue">🜄</span>
        <span style="color: green">🜃</span>
        <span style="color: red">🜂</span>
        <span style="color: orange">🜁</span>
    </h3>
</header>
<main>
    <section id="panel-resources" style="width: 150px; padding: 20px">
        <!-- Resource totals go here -->
    </section>

    <section id="panel-actions" style="width: 150px; padding: 20px">
        <!-- Actions / recipes go here -->
    </section>

    <section id="panel-journal" style="width: 150px; padding: 20px">
        <!-- Decoded notes go here -->
    </section>

    <section id="panel-upgrades" style="width: 150px; padding: 20px">
        <!-- Available upgrades go here -->
    </section>

    <section id="panel-lore" style="width: 150px; padding: 20px">
        <!-- Lore goes here -->
    </section>
</main>
<!-- <aside id="panel-logs">
</aside> -->
<footer>
    <span id="save-status">No save found.</span>
</footer>
<script src="src/data.js"></script>
<script src="src/game.js"></script>
<script src="src/render.js"></script>
<script src="src/save.js"></script>
</body>
</html>
